<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chess - Working Standalone</title>
    <!-- CSS from CDN -->
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #2c3e50; color: white; padding: 20px; }
        #myBoard { width: 400px; margin: 20px 0; border: 5px solid #34495e; border-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .controls { text-align: center; background: #34495e; padding: 15px; border-radius: 8px; width: 400px; }
        button { padding: 10px 20px; cursor: pointer; background: #27ae60; color: white; border: none; border-radius: 5px; margin-top: 10px; font-weight: bold; }
        button:hover { background: #2ecc71; }
        #status { margin-bottom: 10px; font-size: 1.2em; font-weight: bold; color: #ecf0f1; }
    </style>
</head>
<body>

    <h2>Single-File Chess</h2>
    <div id="status">White to move</div>
    <div id="myBoard"></div>

    <div class="controls">
        <label style="cursor:pointer"><input type="checkbox" id="aiToggle"> Play against Random AI</label><br>
        <button id="resetBtn">Reset Board</button>
    </div>

    <!-- Scripts from CDN -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com"></script>
    <script src="https://cloudflare.com"></script>

    <script>
        var board = null;
        var game = new Chess();
        var $status = $('#status');

        function onDragStart (source, piece, position, orientation) {
            if (game.game_over()) return false;
            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }
        }

        function makeRandomMove () {
            var possibleMoves = game.moves();
            if (possibleMoves.length === 0) return;
            var randomIdx = Math.floor(Math.random() * possibleMoves.length);
            game.move(possibleMoves[randomIdx]);
            board.position(game.fen());
            updateStatus();
        }

        function onDrop (source, target) {
            var move = game.move({
                from: source,
                to: target,
                promotion: 'q'
            });
            if (move === null) return 'snapback';
            updateStatus();
            if ($('#aiToggle').is(':checked') && !game.game_over()) {
                window.setTimeout(makeRandomMove, 250);
            }
        }

        function onSnapEnd () {
            board.position(game.fen());
        }

        function updateStatus () {
            var status = '';
            var moveColor = (game.turn() === 'b') ? 'Black' : 'White';
            if (game.in_checkmate()) {
                status = 'Game over, ' + moveColor + ' is in checkmate.';
            } else if (game.in_draw()) {
                status = 'Game over, drawn position';
            } else {
                status = moveColor + ' to move';
                if (game.in_check()) status += ', ' + moveColor + ' is in check';
            }
            $status.html(status);
        }

        var config = {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd,
            // CRITICAL FIX: Direct URL to images
            pieceTheme: 'https://chessboardjs.com{piece}.png'
        };
        board = ChessBoard('myBoard', config);

        $('#resetBtn').on('click', function() {
            game.reset();
            board.start();
            updateStatus();
        });
    </script>
</body>
</html>
