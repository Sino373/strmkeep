<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple HTML Chess</title>
    <!-- Dependencies -->
    <link rel="stylesheet" href="https://unpkg.com">
    <script src="https://jquery.com"></script>
    <script src="https://unpkg.com"></script>
    <script src="https://cloudflare.com"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #2c3e50; color: white; }
        #myBoard { width: 400px; margin-top: 20px; }
        .controls { margin-top: 20px; text-align: center; }
        button { padding: 10px 20px; cursor: pointer; background: #27ae60; color: white; border: none; border-radius: 5px; }
        #status { margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Chess: Friend or AI</h2>
    <div id="status">White to move</div>
    <div id="myBoard"></div>

    <div class="controls">
        <label><input type="checkbox" id="aiToggle"> Play vs AI (Random)</label><br><br>
        <button id="resetBtn">Reset Game</button>
    </div>

    <script>
        var board = null;
        var game = new Chess();
        var $status = $('#status');

        function onDragStart (source, piece, position, orientation) {
            if (game.game_over()) return false;
            // Only pick up pieces for the player whose turn it is
            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }
        }

        function makeRandomMove () {
            var possibleMoves = game.moves();
            if (possibleMoves.length === 0) return;

            var randomIdx = Math.floor(Math.random() * possibleMoves.length);
            game.move(possibleMoves[randomIdx]);
            board.position(game.fen());
            updateStatus();
        }

        function onDrop (source, target) {
            var move = game.move({
                from: source,
                to: target,
                promotion: 'q' // Always promote to queen for simplicity
            });

            if (move === null) return 'snapback';

            updateStatus();

            // If AI is enabled and it's Black's turn
            if ($('#aiToggle').is(':checked') && !game.game_over()) {
                window.setTimeout(makeRandomMove, 250);
            }
        }

        function onSnapEnd () {
            board.position(game.fen());
        }

        function updateStatus () {
            var status = '';
            var moveColor = (game.turn() === 'b') ? 'Black' : 'White';

            if (game.in_checkmate()) {
                status = 'Game over, ' + moveColor + ' is in checkmate.';
            } else if (game.in_draw()) {
                status = 'Game over, drawn position';
            } else {
                status = moveColor + ' to move';
                if (game.in_check()) {
                    status += ', ' + moveColor + ' is in check';
                }
            }
            $status.html(status);
        }

        var config = {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd
        };
        board = ChessBoard('myBoard', config);

        $('#resetBtn').on('click', function() {
            game.reset();
            board.start();
            updateStatus();
        });

        updateStatus();
    </script>
</body>
</html>
