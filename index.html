<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Game</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #board { display: grid; grid-template-columns: repeat(8, 1fr); width: 400px; height: 400px; }
        .square { width: 50px; height: 50px; }
        .white { background-color: #eee; }
        .black { background-color: #444; }
        .piece { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <h1>Chess Game</h1>
    <div id="board"></div>
    <script>
        // Chess game logic and state
        const board = document.getElementById('board');
        const pieces = {
            'bK': '♚', 'bQ': '♛', 'bR': '♖', 'bB': '♗', 'bN': '♞', 'bP': '♟',
            'wK': '♔', 'wQ': '♕', 'wR': '♖', 'wB': '♗', 'wN': '♘', 'wP': '♙',
        };
        let currentTurn = 'w'; // white starts
        let boardState = [];

        // Initialize the board
        function initBoard() {
            for (let i = 0; i < 8; i++) {
                boardState[i] = [];
                for (let j = 0; j < 8; j++) {
                    const square = document.createElement('div');
                    square.classList.add('square', (i + j) % 2 === 0 ? 'white' : 'black');
                    square.dataset.position = `${i}-${j}`;
                    square.addEventListener('click', handleSquareClick);
                    board.appendChild(square);
                    boardState[i][j] = null;
                }
            }
            placePieces();
        }

        // Place pieces on the board
        function placePieces() {
            const initialSetup = [
                ['bR', 'bN', 'bB', 'bQ', 'bK', 'bB', 'bN', 'bR'],
                ['bP', 'bP', 'bP', 'bP', 'bP', 'bP', 'bP', 'bP'],
                [null, null, null, null, null, null, null, null],
                [null, null, null, null, null, null, null, null],
                [null, null, null, null, null, null, null, null],
                [null, null, null, null, null, null, null, null],
                ['wP', 'wP', 'wP', 'wP', 'wP', 'wP', 'wP', 'wP'],
                ['wR', 'wN', 'wB', 'wQ', 'wK', 'wB', 'wN', 'wR']
            ];
            for (let i = 0; i < 8; i++) {
                for (let j = 0; j < 8; j++) {
                    const piece = initialSetup[i][j];
                    if (piece) {
                        placePiece(piece, i, j);
                    }
                }
            }
        }

        // Place a piece on the board
        function placePiece(piece, x, y) {
            const square = board.querySelector(`[data-position='${x}-${y}']`);
            square.textContent = pieces[piece];
            boardState[x][y] = piece;
        }

        let selectedSquare = null;

        // Handle square click event
        function handleSquareClick(event) {
            const position = event.target.dataset.position.split('-');
            const x = parseInt(position[0]);
            const y = parseInt(position[1]);

            if (selectedSquare) {
                // Try to move the piece
                movePiece(selectedSquare, x, y);
                selectedSquare = null;
            } else {
                // Select the piece
                selectPiece(x, y);
            }
        }

        // Select a piece
        function selectPiece(x, y) {
            const piece = boardState[x][y];
            if (piece && piece[0] === currentTurn[0]) {
                selectedSquare = [x, y];
                const square = board.querySelector(`[data-position='${x}-${y}']`);
                square.style.border = '2px solid red'; // Highlight selected piece
            }
        }

        // Move a piece
        function movePiece(selectedSquare, x, y) {
            const [fromX, fromY] = selectedSquare;
            // Implement movement logic here (simplified)
            if (isValidMove(fromX, fromY, x, y)) {
                const piece = boardState[fromX][fromY];
                boardState[x][y] = piece;
                boardState[fromX][fromY] = null;
                placePiece(piece, x, y);
                const squareFrom = board.querySelector(`[data-position='${fromX}-${fromY}']`);
                squareFrom.textContent = '';
                currentTurn = currentTurn === 'w' ? 'b' : 'w'; // Toggle turn
            }
            // Remove highlight
            resetSelectedSquare(selectedSquare);
        }

        // Check if a move is valid
        function isValidMove(fromX, fromY, toX, toY) {
            // Implement actual chess rules here
            return true;
        }

        // Reset selected square
        function resetSelectedSquare([x, y]) {
            const square = board.querySelector(`[data-position='${x}-${y}']`);
            square.style.border = ''; // Remove highlight
        }

        initBoard();
    </script>
</body>
</html>
