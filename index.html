<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Game</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        #board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            width: 400px;
            height: 400px;
            border: 2px solid #333;
        }
        .square {
            width: 50px;
            height: 50px;
        }
        .white {
            background-color: white;
        }
        .black {
            background-color: gray;
        }
        .piece {
            font-size: 40px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="board">
        <!-- Squares will be filled dynamically -->
    </div>
    <script>
        const board = document.getElementById('board');
        const initialPieces = [
            '♜', '♞', '♝', '♛', '♚', '♝', '♞', '♜',
            '♟', '♟', '♟', '♟', '♟', '♟', '♟', '♟',
            null, null, null, null, null, null, null, null,
            null, null, null, null, null, null, null, null,
            null, null, null, null, null, null, null, null,
            null, null, null, null, null, null, null, null,
            '♙', '♙', '♙', '♙', '♙', '♙', '♙', '♙',
            '♖', '♘', '♗', '♕', '♔', '♗', '♘', '♖'
        ];

        function createBoard() {
            for (let i = 0; i < 64; i++) {
                const square = document.createElement('div');
                square.classList.add('square');
                square.classList.add((Math.floor(i / 8) + i) % 2 === 0 ? 'white' : 'black');
                board.appendChild(square);
            }
            setPieces();
        }

        function setPieces() {
            const squares = document.querySelectorAll('.square');
            initialPieces.forEach((piece, index) => {
                if (piece) {
                    const square = squares[index];
                    square.innerHTML = `<span class='piece'>${piece}</span>`;
                }
            });
        }

        createBoard();

        // Full game logic, rules, movement validation, etc., will be implemented here.
        // This will include movement, turn management, check/checkmate detection, etc.
    </script>
</body>
</html>
